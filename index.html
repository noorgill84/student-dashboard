<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- Navbar -->
<nav class="navbar">
  <div class="logo">EduDash</div>
  <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
    <li><a href="courses.html"><i class="fas fa-book"></i> Courses</a></li>
    <li><a href="assignments.html"><i class="fas fa-tasks"></i> Assignments</a></li>
    <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
  </ul>
</nav>

<!-- Dashboard -->
<div class="container fade-in">
  <h1>Welcome Back 👋</h1>

  <div class="cards">
    <div class="card gradient1">
      <i class="fas fa-book-open icon"></i>
      <h3>Courses</h3>
      <p>5 Active Courses</p>
    </div>

    <div class="card gradient2">
      <i class="fas fa-tasks icon"></i>
      <h3>Assignments</h3>
      <p>3 Pending</p>
    </div>

    <div class="card gradient3">
      <i class="fas fa-chart-line icon"></i>
      <h3>Progress</h3>
      <p>75% Completed</p>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
